name: Mirroring to GitLab

on: [push, delete]

jobs:
  to_gitlab:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Mirroring
        run: |
          git push --prune --force https://oauth2:${{ secrets.GITLAB_TOKEN }}@gitlab.com/pibes-programadores/proyecto_is_ii.git +refs/heads/*:refs/heads/* +refs/tags/*:refs/tags/*
